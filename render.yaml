# PlotDNA backend deployment on Render.com
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: plotdna-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    # Public beta can run on free, but expect cold starts.
    plan: free

    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        value: "*"

      # Required public-beta secrets. Set manually in Render.
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

      # Public-beta defaults.
      - key: FREE_SEARCH_LIMIT
        value: "5"
      - key: GEMINI_CHAT_MODELS
        value: gemini-1.5-flash
      - key: GEMINI_BROCHURE_MODELS
        value: gemini-2.0-flash,gemini-1.5-flash
      - key: AI_PROVIDER_ORDER
        value: gemini,nvidia,fallback
      - key: MAX_BROCHURE_SIZE_MB
        value: "10"

      # Optional providers and persistence. Leave unset until configured.
      - key: NVIDIA_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: DLD_API_KEY
        sync: false
      - key: API_SETU_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
